name: Evals Structural (PR Gate)

# PR-blocking eval gate. Runs the LLM-free verifiers (structural + rules +
# traceability) against the 40-case seed corpus under
# `tests/fixtures/eval-demo/` and fails the build if any case regresses
# against the committed per-stage baselines
# (`tests/fixtures/eval-demo/.cclaw/evals/baselines/<stage>.json`).
#
# This workflow intentionally uses **no** secrets and makes zero network
# calls — LLM-backed evals (Tier A/B/C) will arrive as separate workflows
# (`evals-nightly.yml`, `evals-release.yml`) once the judge is wired.

on:
  pull_request:
    paths:
      - "src/eval/**"
      - "src/content/eval-scaffold.ts"
      - "src/cli.ts"
      - "src/constants.ts"
      - "tests/fixtures/eval-demo/**"
      - ".github/workflows/evals-structural.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: evals-structural-${{ github.ref }}
  cancel-in-progress: true

jobs:
  schema-only:
    name: Structural Verifier (schema-only, 24 cases)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20.x"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run structural-only evals against the seed corpus
        working-directory: tests/fixtures/eval-demo
        run: node ../../../dist/cli.js eval --schema-only

      - name: Upload schema-only eval report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-schema-only-report
          path: tests/fixtures/eval-demo/.cclaw/evals/reports/
          if-no-files-found: ignore
          retention-days: 14

  rules:
    name: Rule + Traceability Verifiers (40 cases)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20.x"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run rule + traceability evals against the seed corpus
        working-directory: tests/fixtures/eval-demo
        run: node ../../../dist/cli.js eval --rules

      - name: Upload rules eval report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-rules-report
          path: tests/fixtures/eval-demo/.cclaw/evals/reports/
          if-no-files-found: ignore
          retention-days: 14
