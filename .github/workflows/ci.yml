name: PR Gate

# v8.54 CI matrix simplification:
#   - Hooks were retired in v8.40. The surface is now pure TypeScript prompt
#     content + filesystem ops, so the platform-sensitive footprint is
#     small: path resolution (Windows backslashes), filesystem ops, and
#     process spawn. Linux Node 20 + Windows Node 20 cover that; macOS and
#     Node 22 were dropped to halve CI run-time.
#   - Re-adding macOS or Node 22 requires a deliberate decision documented
#     in CHANGELOG (see v8.54).

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and Test (Linux Node 20.x)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20.x"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  build-and-test-windows:
    name: Build and Test (Windows Node 20.x)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20.x"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  coverage:
    name: Test Coverage (Node 20.x)
    runs-on: ubuntu-latest
    needs:
      - build-and-test
      - build-and-test-windows

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20.x"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test with coverage (enforced thresholds)
        run: npm run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          if-no-files-found: ignore
          retention-days: 14

  security-audit:
    name: Security Audit (npm)
    runs-on: ubuntu-latest
    needs:
      - build-and-test
      - build-and-test-windows

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20.x"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: npm audit (prod, high severity gate)
        run: npm audit --omit=dev --audit-level=high

      - name: npm audit (full, moderate advisory)
        continue-on-error: true
        run: npm audit --audit-level=moderate

  runtime-smoke:
    name: Runtime Smoke
    runs-on: ubuntu-latest
    needs:
      - build-and-test
      - build-and-test-windows

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20.x"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Smoke init/sync/upgrade/uninstall
        run: npm run smoke:runtime

  release-bundle-check:
    name: Release Bundle Check
    runs-on: ubuntu-latest
    needs:
      - runtime-smoke

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20.x"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Release check
        run: npm run release:check

      - name: Build package tarball
        run: npm pack

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: cclaw-package
          path: "*.tgz"
