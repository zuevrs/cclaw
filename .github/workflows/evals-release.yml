name: Evals Release (Tier C Workflow)

# Release-gate eval run. Fires only when a version tag lands on `main`
# (via the Release Please merge) and executes the Tier C multi-stage
# workflow corpus end-to-end against the seed fixtures under
# `tests/fixtures/eval-demo/`. The produced markdown report is uploaded
# as a build artifact and appended to the corresponding GitHub release
# body so reviewers can skim per-stage cost, duration, and consistency
# results alongside the auto-drafted notes.
#
# The workflow is advisory on the tag push itself — it does NOT roll back
# the tag if the evals fail. Maintainers read the report and cut a
# follow-up release if regressions slip through.
#
# Requires two repo/organization secrets to do real work:
#   - CCLAW_EVAL_API_KEY: OpenAI-compatible API key (z.ai GLM for now)
#   - CCLAW_EVAL_BASE_URL: chat-completions base URL
# If either secret is missing the job skips gracefully.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to comment on (e.g. v0.27.0)"
        required: false
        default: ""
      dailyUsdCap:
        description: "Daily USD spend cap for this run"
        required: false
        default: "6.00"

permissions:
  contents: write

concurrency:
  group: evals-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  tier-c:
    name: Tier C workflow evals
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      CCLAW_EVAL_API_KEY: ${{ secrets.CCLAW_EVAL_API_KEY }}
      CCLAW_EVAL_BASE_URL: ${{ secrets.CCLAW_EVAL_BASE_URL }}
      CCLAW_EVAL_MODEL: ${{ vars.CCLAW_EVAL_MODEL || 'glm-5.1' }}
      CCLAW_EVAL_DAILY_USD_CAP: ${{ inputs.dailyUsdCap || '6.00' }}
      CCLAW_EVAL_JUDGE_SAMPLES: "3"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20.x"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Guard against missing API credentials
        id: guard
        run: |
          if [ -z "${CCLAW_EVAL_API_KEY}" ] || [ -z "${CCLAW_EVAL_BASE_URL}" ]; then
            echo "Skipping release evals: CCLAW_EVAL_API_KEY or CCLAW_EVAL_BASE_URL is not configured."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Tier C workflow corpus
        if: steps.guard.outputs.skip != 'true'
        working-directory: tests/fixtures/eval-demo
        run: |
          set -euo pipefail
          node ../../../dist/cli.js eval --tier=C --judge

      - name: Upload release eval reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-release-report
          path: tests/fixtures/eval-demo/.cclaw/evals/reports/
          if-no-files-found: ignore
          retention-days: 90

      - name: Attach Markdown report to the release notes
        if: steps.guard.outputs.skip != 'true' && (github.event_name == 'push' || inputs.tag != '')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event_name == 'push' && github.ref_name || inputs.tag }}
        run: |
          set -euo pipefail
          reports_dir="tests/fixtures/eval-demo/.cclaw/evals/reports"
          latest_md="$(ls -1t "$reports_dir"/eval-*.md 2>/dev/null | head -n1 || true)"
          if [ -z "$latest_md" ]; then
            echo "No Markdown report found under $reports_dir; skipping release note update."
            exit 0
          fi
          body_file="$(mktemp)"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release view "$TAG" --json body -q .body > "$body_file" || true
            printf '\n\n---\n\n## Tier C Eval Report\n\n' >> "$body_file"
            cat "$latest_md" >> "$body_file"
            gh release edit "$TAG" --notes-file "$body_file"
          else
            echo "Release $TAG not found yet; uploading report as artifact only."
          fi
