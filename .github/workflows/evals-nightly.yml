name: Evals Nightly (Judge + Tier A)

# Nightly LLM-backed eval run. Exercises the Tier A single-shot agent and
# the LLM judge against the seed corpus under `tests/fixtures/eval-demo/`,
# then uploads the resulting markdown + JSON reports as artifacts for
# manual review. This workflow is advisory: it will not block PRs. If it
# fails or exceeds the daily USD cap it reports the failure but does not
# gate merges — the PR gate remains `evals-structural.yml`.
#
# Requires two repo/organization secrets to do real work:
#   - CCLAW_EVAL_API_KEY: OpenAI-compatible API key (z.ai GLM for now)
#   - CCLAW_EVAL_BASE_URL: chat-completions base URL
#     (e.g. https://api.z.ai/api/coding/paas/v4)
# If either secret is missing the job skips gracefully — this keeps the
# workflow safe on forks and during initial rollout.

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:
    inputs:
      stage:
        description: "Single stage to target (leave blank for all)"
        required: false
        default: ""
      dailyUsdCap:
        description: "Daily USD spend cap for this run"
        required: false
        default: "2.00"

permissions:
  contents: read

concurrency:
  group: evals-nightly
  cancel-in-progress: false

jobs:
  judge:
    name: Judge + Tier A (single-shot)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      CCLAW_EVAL_API_KEY: ${{ secrets.CCLAW_EVAL_API_KEY }}
      CCLAW_EVAL_BASE_URL: ${{ secrets.CCLAW_EVAL_BASE_URL }}
      CCLAW_EVAL_MODEL: ${{ vars.CCLAW_EVAL_MODEL || 'glm-5.1' }}
      CCLAW_EVAL_DAILY_USD_CAP: ${{ inputs.dailyUsdCap || '2.00' }}
      CCLAW_EVAL_JUDGE_SAMPLES: "3"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20.x"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Guard against missing API credentials
        id: guard
        run: |
          if [ -z "${CCLAW_EVAL_API_KEY}" ] || [ -z "${CCLAW_EVAL_BASE_URL}" ]; then
            echo "Skipping nightly evals: CCLAW_EVAL_API_KEY or CCLAW_EVAL_BASE_URL is not configured."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run judge + tier A over the seed corpus
        if: steps.guard.outputs.skip != 'true'
        working-directory: tests/fixtures/eval-demo
        run: |
          set -euo pipefail
          args=("eval" "--judge" "--tier=A")
          if [ -n "${{ inputs.stage }}" ]; then
            args+=("--stage=${{ inputs.stage }}")
          fi
          node ../../../dist/cli.js "${args[@]}"

      - name: Upload nightly eval report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-nightly-report
          path: tests/fixtures/eval-demo/.cclaw/evals/reports/
          if-no-files-found: ignore
          retention-days: 30

      - name: Upload spend ledger
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-nightly-spend-ledger
          path: tests/fixtures/eval-demo/.cclaw/evals/.spend-*.json
          if-no-files-found: ignore
          retention-days: 30
