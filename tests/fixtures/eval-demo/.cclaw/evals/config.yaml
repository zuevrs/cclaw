# Canonical cclaw eval corpus used by the project's own CI.
# Wave 7.1 exercises structural verifiers; LLM calls arrive in Wave 7.3.
provider: zai
baseUrl: https://api.z.ai/api/coding/paas/v4
model: glm-5.1
defaultTier: A
timeoutMs: 120000
maxRetries: 2
regression:
  failIfDeltaBelow: -0.15
  failIfCriticalBelow: 3.0
