id: tdd-05-auth-refactor-rules
stage: tdd
input_prompt: |
  Audit the passkey TDD artifact for red/green/refactor coverage.
fixture: ./tdd-02-auth-refactor/fixture.md
expected:
  rules:
    must_contain:
      - "Red"
      - "Green"
      - "Refactor"
    must_not_contain:
      - "skipped test"
    regex_required:
      - pattern: "(red|green)\\s+test"
        description: Red or green test mention
    min_occurrences:
      "Run output:": 2
    unique_bullets_in_section:
      - Red
