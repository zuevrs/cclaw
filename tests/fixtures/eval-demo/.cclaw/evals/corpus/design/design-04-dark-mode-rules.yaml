id: design-04-dark-mode-rules
stage: design
input_prompt: |
  Audit the dark-mode design for context/decision/consequences coverage.
fixture: ./design-01-dark-mode/fixture.md
expected:
  rules:
    must_contain:
      - "Context"
      - "Decision"
      - "Consequences"
    must_not_contain:
      - "maybe"
      - "might eventually"
    regex_required:
      - pattern: "^## "
        flags: m
        description: At least one H2 section
    min_occurrences:
      "## ": 3
    unique_bullets_in_section:
      - Consequences
