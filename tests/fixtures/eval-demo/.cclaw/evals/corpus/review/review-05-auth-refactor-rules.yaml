id: review-05-auth-refactor-rules
stage: review
input_prompt: |
  Audit the passkey review for findings/risks/signoff coverage.
fixture: ./review-02-auth-refactor/fixture.md
expected:
  rules:
    must_contain:
      - "Findings"
      - "Signoff"
      - "approved"
    must_not_contain:
      - "TBD"
    regex_required:
      - pattern: "@[a-z-]+-owner"
        description: At least one owner handle
    min_occurrences:
      "-owner": 3
    unique_bullets_in_section:
      - Findings
      - Signoff
