id: review-04-dark-mode-rules
stage: review
input_prompt: |
  Audit the dark-mode review for findings/risks/signoff coverage.
fixture: ./review-01-dark-mode/fixture.md
expected:
  rules:
    must_contain:
      - "Findings"
      - "Signoff"
      - "approved"
    must_not_contain:
      - "TBD"
      - "follow up later"
    regex_required:
      - pattern: "@[a-z-]+-owner"
        description: At least one owner handle
    min_occurrences:
      "-owner": 3
    unique_bullets_in_section:
      - Findings
      - Signoff
