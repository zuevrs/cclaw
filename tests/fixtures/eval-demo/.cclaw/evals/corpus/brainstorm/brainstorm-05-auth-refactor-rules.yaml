id: brainstorm-05-auth-refactor-rules
stage: brainstorm
input_prompt: |
  Audit the passkey brainstorm for rule-level structure.
fixture: ./brainstorm-02-auth-refactor/fixture.md
expected:
  rules:
    must_contain:
      - "Recommendation"
      - "Rationalizations"
    must_not_contain:
      - "hand-wave"
      - "TBD"
    regex_required:
      - pattern: "^\\s*-\\s+\\S+"
        flags: m
        description: At least one bulleted direction
    min_occurrences:
      "- ": 3
    unique_bullets_in_section:
      - Directions
