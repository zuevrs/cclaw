id: brainstorm-04-dark-mode-rules
stage: brainstorm
input_prompt: |
  Audit the dark-mode brainstorm for rule-level structure.
fixture: ./brainstorm-01-dark-mode/fixture.md
expected:
  rules:
    must_contain:
      - "Recommendation"
      - "Rationalizations"
    must_not_contain:
      - "hand-wave"
      - "revisit later"
    regex_required:
      - pattern: "^\\s*-\\s+\\S+"
        flags: m
        description: At least one bulleted direction
    min_occurrences:
      "- ": 3
    unique_bullets_in_section:
      - Directions
