id: plan-05-auth-refactor-rules
stage: plan
input_prompt: |
  Audit the passkey plan for milestones/steps/risks coverage.
fixture: ./plan-02-auth-refactor/fixture.md
expected:
  rules:
    must_contain:
      - "Milestones"
      - "Steps"
      - "Risks"
    must_not_contain:
